# Подхватывается NetworkManager-овским dnsmasq.
#
# Все DNS-запросы пересылаем в локальный stubby (DoT к 1.1.1.1).
# При резолве .ru / .xn--p1ai (.рф) IP-адреса попадают в nft-сеты bypass_ru_v{4,6}.

# Не использовать никакие DNS из DHCP/resolv.conf
no-resolv
# Игнорировать апстримы, которые NM хочет добавить из активных соединений
strict-order
# Единственный апстрим — наш stubby
server=127.0.0.1#5353

nftset=/ru/4#inet#bypass#bypass_ru_v4
nftset=/ru/6#inet#bypass#bypass_ru_v6
nftset=/xn--p1ai/4#inet#bypass#bypass_ru_v4
nftset=/xn--p1ai/6#inet#bypass#bypass_ru_v6

cache-size=2000
