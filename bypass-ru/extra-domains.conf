# Дополнительные домены для обхода VPN (через WiFi напрямую).
#
# Формат — строка на домен:
#   nftset=/<домен>/4#inet#bypass#bypass_ru_v4
#   nftset=/<домен>/6#inet#bypass#bypass_ru_v6
#
# Совпадение по суффиксу: правило для example.com покрывает и api.example.com.
# После правки файла:
#   sudo systemctl restart NetworkManager
#   sudo conntrack -F            # сбросить старые маршруты в кеше
#
# Для удаления домена — просто закомментировать или удалить строку.

# emias.info (московская медицина)
nftset=/emias.info/4#inet#bypass#bypass_ru_v4
nftset=/emias.info/6#inet#bypass#bypass_ru_v6
